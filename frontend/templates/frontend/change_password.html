{% extends 'frontend/base.html' %}
{% block title %}Change Password — vShop{% endblock %}
{% block content %}
<div class="max-w-md mx-auto space-y-6">
  <h1 class="text-2xl font-bold text-white">Change Password</h1>

  <div class="card p-6 space-y-4">
    <form method="post" class="space-y-4">
      {% csrf_token %}

      <div>
        <label class="block text-xs text-slate-400 mb-1">Current Password</label>
        <input type="password" name="current_password" required
          class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-indigo-500">
      </div>

      <div>
        <label class="block text-xs text-slate-400 mb-1">New Password</label>
        <input type="password" name="new_password" required minlength="6"
          class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-indigo-500">
      </div>

      <div>
        <label class="block text-xs text-slate-400 mb-1">Confirm New Password</label>
        <input type="password" name="confirm_password" required minlength="6"
          class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-indigo-500">
      </div>

      <button type="submit" class="btn-primary w-full py-2 text-sm">Update Password</button>
    </form>
  </div>

  <p class="text-slate-500 text-xs text-center">
    After changing your password you will remain logged in.
  </p>
</div>
{% endblock %}
