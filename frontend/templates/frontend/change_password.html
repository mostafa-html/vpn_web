{% extends 'frontend/base.html' %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto space-y-6">
  <h1 class="text-2xl font-bold text-white">Change Password</h1>

  {% if messages %}
    {% for msg in messages %}
      <div class="px-4 py-3 rounded-lg text-sm
        {% if msg.tags == 'error' %}bg-red-900/60 text-red-300 border border-red-700
        {% else %}bg-green-900/60 text-green-300 border border-green-700{% endif %}">
        {{ msg }}
      </div>
    {% endfor %}
  {% endif %}

  <form method="post" class="card space-y-5">
    {% csrf_token %}

    <div>
      <label class="block text-xs text-slate-400 mb-1">Current Password</label>
      <input type="password" name="current_password" required
        class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-indigo-500">
    </div>

    <div>
      <label class="block text-xs text-slate-400 mb-1">New Password <span class="text-slate-500">(min 6 characters)</span></label>
      <input type="password" name="new_password1" required minlength="6"
        class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-indigo-500">
    </div>

    <div>
      <label class="block text-xs text-slate-400 mb-1">Confirm New Password</label>
      <input type="password" name="new_password2" required minlength="6"
        class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-indigo-500">
    </div>

    <div class="flex gap-3 pt-1">
      <button type="submit" class="btn-primary flex-1 py-2 text-sm">Save Password</button>
      <a href="{% url 'frontend:dashboard' %}" class="flex-1 text-center py-2 text-sm bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition">Cancel</a>
    </div>
  </form>

  <p class="text-slate-500 text-xs text-center">
    After changing your password you will stay logged in.
  </p>
</div>
{% endblock %}
