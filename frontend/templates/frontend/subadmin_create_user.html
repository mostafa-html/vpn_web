{% extends 'frontend/base.html' %}
{% block title %}Create User — vShop{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto space-y-6">
  <div class="flex items-center gap-3">
    <a href="{% url 'frontend:subadmin_users' %}" class="text-slate-400 hover:text-white"><i class="fa-solid fa-arrow-left"></i></a>
    <h1 class="text-2xl font-bold text-white">Create User</h1>
  </div>
  <div class="card">
    <form method="post" class="space-y-5">
      {% csrf_token %}
      {% for field in form %}
      <div>
        <label class="block text-sm text-slate-400 mb-1.5">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<p class="text-red-400 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn-primary"><i class="fa-solid fa-user-plus"></i> Create User</button>
    </form>
  </div>
</div>
{% endblock %}
