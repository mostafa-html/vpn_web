# docker-compose.yml  — vShop Multi-Tenant Proxy Billing Stack

volumes:
  protected_media:
  staticfiles:
  redis_data:

networks:
  vshop_net:
    driver: bridge

services:

  # ── 1. Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - vshop_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Django / Gunicorn ───────────────────────────────────────────────────
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - protected_media:/app/protected_media
      - staticfiles:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - vshop_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/login/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── 3. Celery Worker ─────────────────────────────────────────────────────────
  celery_worker:
    build: .
    restart: unless-stopped
    command: celery -A vShop worker --loglevel=info -Ofair --concurrency=4
    env_file: .env
    volumes:
      - protected_media:/app/protected_media
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - vshop_net

  # ── 4. Celery Beat ────────────────────────────────────────────────────────────
  celery_beat:
    build: .
    restart: unless-stopped
    command: celery -A vShop beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - vshop_net
