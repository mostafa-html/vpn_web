# docker-compose.yml  — vShop Multi-Tenant Proxy Billing Stack

volumes:
  protected_media:    # private upload store (transaction screenshots)
  staticfiles:        # collectstatic output, shared with potential nginx sidecar
  redis_data:

networks:
  vshop_net:
    driver: bridge

services:

  # ── 1. Message Broker & Cache ──────────────────────────────────────────
  redis:
    image: redis:alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - vshop_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Django Web Application (Gunicorn) ───────────────────────────────
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - protected_media:/app/protected_media
      - staticfiles:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - vshop_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/login/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── 3. Celery Task Consumer ───────────────────────────────────────────────
  celery_worker:
    build: .
    restart: unless-stopped
    command: celery -A vShop worker --loglevel=info -Ofair --concurrency=4
    env_file: .env
    volumes:
      - protected_media:/app/protected_media
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - vshop_net

  # ── 4. Celery Beat Scheduler ───────────────────────────────────────────────
  celery_beat:
    build: .
    restart: unless-stopped
    command: celery -A vShop beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - vshop_net
